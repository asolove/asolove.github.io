---
layout: default
title: "Adam Solove: Blog"
---

<section>
  <div>
    <h1>Blog</h1>
  </div>
</section>
<section>
  <div>
    <h2></h2>
    <ul class="posts">
      {% for post in site.posts %}
      <p>
        <a href="{{ post.url }}"><h3>{{ post.title }}</h3></a>
        <span>{{ post.description }}</span>
        <time>{{ post.date | date_to_string }}</time>
      </p>
      {% endfor %}
    </ul>
  </div>
</section>
